version: 2

builds:
  - main: .
    binary: shan
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/Kocoro-lab/shan/cmd.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "shan_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      # ax_server is built by CI (macOS only). Present in dist/ at release time.
      # Included in all archives; Linux users get an unused binary (~2-3MB).
      - src: dist/ax_server
        dst: .
        strip_parent: true

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: Kocoro-lab
    name: shan
