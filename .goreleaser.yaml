version: 2

builds:
  - main: .
    binary: shan
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/Kocoro-lab/shan/cmd.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "shannon-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: Kocoro-lab
    name: shannon-cli
